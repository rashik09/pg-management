<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Details | NexStay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>

        .pg-content-layout {
            display: grid;
            grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr);
            gap: 2.5rem;
            margin-top: 2.5rem;
            margin-bottom: 5rem;
            align-items: start;
        }

        @media (max-width: 900px) {
            .pg-content-layout {
                grid-template-columns: 1fr;
            }
        }

        .pg-details h1 {
            font-size: 2.25rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            line-height: 1.2;
        }

        .pg-meta-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            color: var(--text-main);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .pg-meta-badge {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: white;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
        }
        
        .pg-meta-badge i {
            color: var(--primary);
            width: 18px;
            height: 18px;
        }

        .pg-description {
            color: var(--text-muted);
            line-height: 1.7;
            font-size: 1.05rem;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2.5rem;
        }

        .amenities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.25rem;
            margin-top: 1rem;
        }

        .amenity-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-main);
            font-weight: 500;
            background: white;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .amenity-item i {
            color: var(--primary);
            width: 20px;
            height: 20px;
        }

        .booking-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            position: sticky;
            top: 120px;
        }
        
        .price-huge {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text-main);
        }
        
        .price-huge span {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-left: 0.25rem;
        }
    </style>
</head>
<body>

    <nav class="navbar glass">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i data-lucide="home"></i>
                <span>NexStay</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="index.html#search">Search</a>
            </div>
        </div>
    </nav>

    <main class="container" id="loadingContainer" style="padding-top: 6rem; min-height: 80vh; display:flex; align-items:center; justify-content:center;">
        <div style="text-align:center; color:var(--text-muted);">
            <i data-lucide="loader-2" style="animation: spin 2s linear infinite; width:40px; height:40px; margin-bottom:1rem; color:var(--primary);"></i>
            <h2>Loading Property...</h2>
        </div>
    </main>

    <main class="container" id="pgContainer" style="padding-top: 6rem; display:none; min-height: 80vh;">
        <!-- Header -->
        <a href="index.html" style="display:inline-flex; align-items:center; gap:0.5rem; color:var(--text-muted); text-decoration:none; margin-top:2rem; font-weight:500;">
            <i data-lucide="arrow-left" style="width:16px;"></i> Back to search
        </a>

        <!-- Dynamic Content injected here by pg.js -->
        
    </main>
    
    <!-- Booking Modal (Reused from Index) -->
    <div class="modal-overlay" id="bookModal">
        <div class="modal" style="max-width: 400px; text-align: center;">
            <div class="modal-header" style="justify-content: center; position: relative;">
                <h3>Book <span id="bookPgTitleText" style="color:var(--primary);">Property</span></h3>
                <button class="close-modal" onclick="closeBookModal()" style="position: absolute; right: 0; top: -5px;"><i data-lucide="x"></i></button>
            </div>
            
            <div id="bookFormContainer">
                <p style="color:var(--text-muted); font-size: 0.9rem; margin-bottom:1.5rem;">Enter your contact details. The owner will reach out to you directly.</p>
                <form id="bookForm" onsubmit="submitBooking(event)">
                    <input type="hidden" id="bookPgId">
                    <div class="form-group" style="text-align: left;">
                        <label>Your Full Name</label>
                        <input type="text" id="bookName" class="form-control" required>
                    </div>
                    <div class="form-group" style="text-align: left; margin-bottom: 1.5rem;">
                        <label>Phone Number</label>
                        <input type="tel" id="bookPhone" class="form-control" pattern="[0-9]{10}" maxlength="10" minlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="10-digit number" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;" id="bookSubmitBtn">Send Inquiry</button>
                </form>
            </div>

            <div id="bookSuccessContainer" style="display: none; padding: 1rem 0;">
                <div style="color: #10B981; margin-bottom: 1rem;">
                    <i data-lucide="check-circle" style="width: 48px; height: 48px; stroke-width: 1.5;"></i>
                </div>
                <h3 style="margin-bottom: 0.5rem;">Inquiry Sent!</h3>
                <p style="color:var(--text-muted); font-size: 0.9rem;">The owner has received your request and will contact you shortly.</p>
                <button class="btn btn-primary-outline" style="width: 100%; justify-content: center; margin-top: 1.5rem;" onclick="closeBookModal()">Close</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <div class="logo">
                    <i data-lucide="home"></i>
                    <span>NexStay</span>
                </div>
                <p style="color: var(--text-muted); margin-top: 1rem;">Modern living spaces for students and professionals.</p>
            </div>
        </div>
    </footer>

    <script src="js/data.js?v=1.2"></script>
    <script src="js/pg.js?v=1.2"></script>
    <script>
        lucide.createIcons();
        
        // Simple Auth navbar injection logic
        const navLinks = document.getElementById('navLinks');
        const token = localStorage.getItem('auth_token');
        const role = localStorage.getItem('user_role');
        const name = localStorage.getItem('user_name');

        if(token) {
            if(role === 'owner') {
                navLinks.innerHTML += `<a href="admin.html" class="btn btn-primary-outline">Dashboard</a>`;
            } else {
                navLinks.innerHTML += `<a href="dashboard.html" class="btn btn-primary-outline">My Bookings</a>`;
            }
            navLinks.innerHTML += `
                <div style="display:flex; align-items:center; gap:1rem; margin-left: 1rem;">
                    <span style="font-weight:600; color:var(--text-main);">Hi, ${name}</span>
                    <button class="btn btn-primary-outline" style="padding:0.25rem 0.75rem;" onclick="logout()">Logout</button>
                </div>
            `;
        } else {
            navLinks.innerHTML += `<a href="login.html" class="btn btn-primary">Sign In</a>`;
        }
        
        function logout() {
            localStorage.clear();
            window.location.reload();
        }
    </script>
</body>
</html>
