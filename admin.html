<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | NexStay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="admin-body">
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo">
                <i data-lucide="home"></i>
                <span>NexStay <span class="admin-badge">Admin</span></span>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="#dashboard" class="nav-item active" id="tab-dashboard">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a href="#manage" class="nav-item" id="tab-manage">
                <i data-lucide="building-2"></i> Manage PGs
            </a>
            <a href="#inquiries" class="nav-item" id="tab-inquiries">
                <i data-lucide="message-square"></i> Inquiries
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="index.html" class="nav-item">
                <i data-lucide="log-out"></i> Client Portal
            </a>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-header glass">
            <h2>Welcome back, Admin</h2>
            <div class="admin-profile">
                <div class="avatar">A</div>
            </div>
        </header>

        <div class="admin-content" id="adminContent">
            <!-- Dynamic Content Injected Here by JS -->
        </div>

        <!-- Add PG Modal -->
        <div class="modal-overlay" id="addPgModal">
            <div class="modal">
                <div class="modal-header">
                    <h3>Add New Property</h3>
                    <button class="close-modal" onclick="closeAddPGModal()"><i data-lucide="x"></i></button>
                </div>
                <form id="addPgForm" onsubmit="submitNewPG(event)">
                    <div class="form-group">
                        <label>Property Name</label>
                        <input type="text" id="pgTitle" class="form-control" required>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                        <div class="form-group">
                            <label>Location Area</label>
                            <input type="text" id="pgLocation" class="form-control" placeholder="e.g. Bandra" required>
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" id="pgCity" class="form-control" required>
                        </div>
                    </div>
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:1rem;">
                        <div class="form-group">
                            <label>Rent Price (₹)</label>
                            <input type="number" id="pgPrice" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Tenant Type</label>
                            <select id="pgType" class="form-control" required>
                                <option value="Boys">Boys</option>
                                <option value="Girls">Girls</option>
                                <option value="Co-ed">Co-ed</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Vacancies</label>
                            <input type="number" id="pgVacancies" class="form-control" value="1" min="0" required>
                        </div>
                    </div>
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                        <div class="form-group">
                            <label>Sharing Type</label>
                            <select id="pgSharing" class="form-control" required>
                                <option value="1 Sharing">1 Sharing (Private)</option>
                                <option value="2 Sharing">2 Sharing</option>
                                <option value="3 Sharing">3 Sharing</option>
                                <option value="4+ Sharing">4+ Sharing</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Bathroom</label>
                            <select id="pgBathroom" class="form-control" required>
                                <option value="Attached">Attached</option>
                                <option value="Common">Common</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label>Property Description</label>
                        <textarea id="pgDescription" class="form-control" rows="3" placeholder="Describe the living space, surrounding area, and building rules..." required></textarea>
                    </div>

                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label>Amenities</label>
                        <div style="display:flex; gap:1.5rem; margin-top:0.5rem;">
                            <label style="display:flex; align-items:center; gap:0.5rem; font-weight:normal;"><input type="checkbox" id="pgAc"> AC</label>
                            <label style="display:flex; align-items:center; gap:0.5rem; font-weight:normal;"><input type="checkbox" id="pgWifi"> WiFi</label>
                            <label style="display:flex; align-items:center; gap:0.5rem; font-weight:normal;"><input type="checkbox" id="pgHotWater"> Hot Water</label>
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn" style="background:#E5E7EB; color:#374151;" onclick="closeAddPGModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Property</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
