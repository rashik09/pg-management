<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NexStay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 2rem 1rem;
        }

        .auth-body::before, .auth-body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
        }

        .auth-body::before {
            background: rgba(99, 102, 241, 0.4);
            top: -150px;
            left: -150px;
        }

        .auth-body::after {
            background: rgba(236, 72, 153, 0.3);
            bottom: -150px;
            right: -150px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.5);
            text-align: center;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--primary);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-decoration: none;
        }
        
        .auth-card h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .auth-card p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .role-selector {
            display: flex;
            background: rgba(0,0,0,0.05);
            border-radius: 12px;
            padding: 0.25rem;
            margin-bottom: 1.5rem;
        }

        .role-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
        }

        .role-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .auth-form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255,255,255,0.5);
            outline: none;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary);
            background: white;
        }

        .btn-full {
            width: 100%;
            padding: 0.75rem;
            justify-content: center;
            margin-top: 1rem;
            font-size: 1rem;
        }

        .toggle-mode {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            cursor: pointer;
        }
        
        .toggle-mode span {
            color: var(--primary);
            font-weight: 600;
        }

        .error-msg {
            color: #DC2626;
            background: #FEE2E2;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }

        #nameGroup {
            display: none;
        }
    </style>
</head>
<body class="auth-body">

    <div class="auth-card">
        <a href="index.html" class="auth-logo">
            <i data-lucide="home" style="width:32px; height:32px;"></i> NexStay
        </a>
        <h2 id="authTitle">Welcome Back</h2>
        <p id="authSub">Log in to manage your spaces</p>

        <div class="role-selector">
            <button class="role-btn active" id="roleUser" onclick="setRole('user')">User</button>
            <button class="role-btn" id="roleOwner" onclick="setRole('owner')">PG Owner</button>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form class="auth-form" id="authForm" onsubmit="handleAuth(event)">
            <input type="hidden" id="currentRole" value="user">
            <input type="hidden" id="authMode" value="login">

            <div class="form-group" id="nameGroup">
                <label>Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="John Doe">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Sign In</button>
        </form>

        <div class="toggle-mode" onclick="toggleMode()">
            <span id="toggleText">Don't have an account? Sign up</span>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
