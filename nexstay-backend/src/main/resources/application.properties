# NexStay Spring Boot Configuration

# Server port (same as Flask)
server.port=5000

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/nexstay?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mypass123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate DDL - auto creates/updates tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (accessible at http://localhost:5000/h2-console for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Static resources - serve frontend files from outside the jar
spring.web.resources.static-locations=file:../,file:../uploads/,classpath:/static/

# File uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory (relative to where server runs)
app.upload-dir=../uploads

# JWT
app.jwt-secret=super-secret-premium-key-for-nexstay
app.jwt-expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:8000,http://127.0.0.1:8000,http://localhost:5000,http://127.0.0.1:5000

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.nexstay=INFO
